version: '3.8'

services:
  proofforge:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PORT=3000
      - DATA_DIR=/app/data
    restart: unless-stopped
